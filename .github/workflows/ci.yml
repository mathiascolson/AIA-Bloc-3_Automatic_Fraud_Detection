name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:
    inputs:
      check_live_model_promotion:
        description: "Check live champion/challenger metrics from MLflow aliases"
        required: false
        default: false
        type: boolean

jobs:
  validate-project:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Airflow
        run: |
          python -m pip install --upgrade pip
          AIRFLOW_VERSION=2.10.5
          PYTHON_VERSION=3.11
          CONSTRAINT_URL="https://raw.githubusercontent.com/apache/airflow/constraints-${AIRFLOW_VERSION}/constraints-${PYTHON_VERSION}.txt"
          pip install "apache-airflow==${AIRFLOW_VERSION}" --constraint "${CONSTRAINT_URL}"

      - name: Install project dependencies
        run: |
          pip install -r requirements.txt
          pip install -r requirements-airflow.txt
          pip install "typing_extensions>=4.15.0"

      - name: Check installed dependency versions
        run: |
          python - <<'PY'
          import typing_extensions
          import pydantic
          import mlflow
          import great_expectations
          import airflow

          print("typing_extensions:", typing_extensions.__version__ if hasattr(typing_extensions, "__version__") else "unknown")
          print("pydantic:", pydantic.__version__)
          print("mlflow:", mlflow.__version__)
          print("great_expectations:", great_expectations.__version__)
          print("airflow:", airflow.__version__)
          PY

      - name: Run tests
        run: |
          pytest -q

      - name: Check imports
        run: |
          python -c "import src.api_client"
          python -c "import src.validation"
          python -c "import src.preprocessing"
          python -c "import src.inference"
          python -c "import src.db"
          python -c "import src.mlflow_utils"
          python -c "import src.model_promotion"
          python -c "import src.data_quality"
          python -c "import src.training_dataset_store"
          python -c "import src.xcom_utils"

      - name: Check DAG syntax
        run: |
          python -m py_compile dags/fraud_inference_pipeline.py
          python -m py_compile dags/fraud_retraining_cd_pipeline.py

      - name: Check training script import
        run: |
          python -m py_compile src/train_model_candidates.py
          python -c "import src.train_model_candidates"

      - name: Check model promotion module
        run: |
          python -m py_compile src/model_promotion.py
          python - <<'PY'
          from src.model_promotion import build_cd_decision, is_candidate_better

          assert callable(is_candidate_better)
          assert callable(build_cd_decision)

          print("model_promotion module is importable and exposes expected functions.")
          PY

      - name: Check live model promotion decision from MLflow
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.check_live_model_promotion }}
        env:
          MLFLOW_TRACKING_URI: ${{ secrets.MLFLOW_TRACKING_URI }}
          MLFLOW_MODEL_NAME: ${{ secrets.MLFLOW_MODEL_NAME }}
        run: |
          python - <<'PY'
          import json
          import os

          import mlflow
          from mlflow.tracking import MlflowClient

          from src.model_promotion import build_cd_decision, is_candidate_better

          required_metrics = [
              "average_precision",
              "production_recall",
              "production_precision",
          ]

          tracking_uri = os.environ.get("MLFLOW_TRACKING_URI")
          model_name = os.environ.get("MLFLOW_MODEL_NAME")

          if not tracking_uri:
              raise ValueError("Missing GitHub secret: MLFLOW_TRACKING_URI")

          if not model_name:
              raise ValueError("Missing GitHub secret: MLFLOW_MODEL_NAME")

          mlflow.set_tracking_uri(tracking_uri)
          client = MlflowClient(tracking_uri=tracking_uri)

          def load_model_info_by_alias(alias: str) -> dict:
              model_version = client.get_model_version_by_alias(
                  name=model_name,
                  alias=alias,
              )
              run = client.get_run(model_version.run_id)
              run_metrics = run.data.metrics

              missing_metrics = [
                  metric
                  for metric in required_metrics
                  if metric not in run_metrics
              ]

              if missing_metrics:
                  raise ValueError(
                      f"Missing metrics for MLflow alias '{alias}': {missing_metrics}"
                  )

              return {
                  "version": model_version.version,
                  "run_id": model_version.run_id,
                  "metrics": {
                      metric: run_metrics[metric]
                      for metric in required_metrics
                  },
              }

          champion_info = load_model_info_by_alias("champion")
          challenger_info = load_model_info_by_alias("challenger")

          promoted, decision_reason = is_candidate_better(
              champion_metrics=champion_info["metrics"],
              challenger_metrics=challenger_info["metrics"],
          )

          decision = build_cd_decision(
              model_name=model_name,
              champion_info=champion_info,
              challenger_info=challenger_info,
              promoted=promoted,
              decision_reason=decision_reason,
          )

          print(json.dumps(decision, indent=2, ensure_ascii=False))

          if not promoted:
              raise SystemExit(decision_reason)
          PY
